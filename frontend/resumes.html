<body class="bg-background text-on-background min-h-screen flex font-body-md text-body-md">

  <div class="px-gutter mb-unit-md">
    <button data-open-import class="w-full bg-primary text-on-primary py-2 rounded-lg font-label-md text-label-md flex items-center justify-center gap-2 hover:bg-primary-container transition-colors shadow-sm">

<main class="flex-1 md:ml-sidebar-width flex flex-col min-h-screen" data-active-nav="resumes">

<header class="h-16 px-gutter flex justify-between items-center bg-surface border-b border-outline-variant sticky top-0 z-40">
  <div class="md:hidden flex items-center gap-2">
    <div class="w-8 h-8 rounded-full bg-primary text-on-primary flex items-center justify-center font-bold">C</div>
    <h1 class="font-headline-md text-headline-md font-bold text-primary">CareerCaddy AI</h1>
  </div>
  <div class="hidden md:flex items-center bg-surface-container-low rounded-full px-4 py-2 border border-outline-variant w-96">
    <span class="material-symbols-outlined text-on-surface-variant mr-2">search</span>
    <input id="global-search" class="bg-transparent border-none outline-none text-body-md font-body-md w-full text-on-surface placeholder:text-outline focus:ring-0" placeholder="Search jobs, applications..." type="text"/>
  </div>
  <div class="flex items-center gap-4">
    <a href="/review.html" class="text-on-surface-variant hover:text-primary transition-all duration-200"><span class="material-symbols-outlined">notifications</span></a>
    <div class="w-8 h-8 rounded-full overflow-hidden border border-outline-variant bg-surface-container-high flex items-center justify-center text-primary font-semibold">A</div>
  </div>
</header>


    <div class="p-gutter max-w-container-max mx-auto w-full space-y-unit-lg">
      <div><h2 class="font-headline-lg text-headline-lg mb-2">Resumes</h2><p class="font-body-lg text-body-lg text-on-surface-variant">Upload resume versions for SWE, data, and support roles.</p></div>
      <form id="resume-form" class="cc-card p-5 flex flex-col md:flex-row gap-3 items-end">
        <div class="w-full"><label class="font-label-md text-label-md uppercase text-on-surface-variant">Resume Type</label><select id="resume-type" class="cc-input mt-1"><option>SWE</option><option>DATA_ANALYST</option><option>SUPPORT_ENGINEER</option></select></div>
        <div class="w-full"><label class="font-label-md text-label-md uppercase text-on-surface-variant">File</label><input id="resume-file" type="file" class="cc-input mt-1" required></div>
        <button class="cc-button cc-button-primary min-w-36"><span class="material-symbols-outlined text-sm">upload_file</span>Upload</button>
      </form>
      <div class="cc-card overflow-hidden"><div id="resume-list" class="divide-y divide-outline-variant"></div></div>
    </div>

</main>
<div id="toast-root" class="fixed right-4 bottom-4 z-[100] space-y-2"></div>
<script src="/assets/api.js"></script>
<script src="/assets/app.js"></script>

    <script>
    async function loadResumes(){ try{ const resumes = await CareerAPI.getResumes(); document.getElementById('resume-list').innerHTML = resumes.map(r => `<div class="p-4 flex items-center justify-between"><div class="flex items-center gap-3"><span class="material-symbols-outlined text-error">picture_as_pdf</span><div><p class="font-medium">${r.file_name}</p><p class="text-on-surface-variant text-sm">${r.resume_type} - ${formatDate(r.created_at)}</p></div></div><button data-id="${r.resume_id}" class="cc-button cc-button-danger">Delete</button></div>`).join('') || '<div class="p-8 text-center text-on-surface-variant">No resumes uploaded.</div>'; }catch(e){handleError(e);} }
    document.getElementById('resume-form').onsubmit = async (e) => { e.preventDefault(); const file = document.getElementById('resume-file').files[0]; try{ await CareerAPI.uploadResume(file, document.getElementById('resume-type').value); showToast('Resume uploaded.'); e.target.reset(); loadResumes(); }catch(err){handleError(err);} };
    document.getElementById('resume-list').onclick = async (e) => { const b = e.target.closest('button[data-id]'); if(!b) return; try{ await CareerAPI.deleteResume(b.dataset.id); showToast('Resume deleted.'); loadResumes(); }catch(err){handleError(err);} };
    loadResumes();
    </script>

</body>
</html>
