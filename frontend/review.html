<div id="toast-root" class="fixed right-4 bottom-4 z-[100] space-y-2"></div>
<script src="/assets/api.js"></script>
<script src="/assets/app.js"></script>

    <script>
    let currentApp = null;
    let refreshTimer = null;
    let screenshotBlob = null;
    let screenshotObjectUrl = null;
    const runningStatuses = new Set(['READY_FOR_WORKER', 'IN_PROGRESS']);
    const answerFields = [
      ['full_name','Full name'],['email','Email'],['phone','Phone'],['location','Location'],
      ['linkedin','LinkedIn'],['github','GitHub'],['portfolio','Portfolio'],['work_authorization','Work authorization'],
      ['resume_version','Resume version'],['why_interested','Why interested'],['why_good_fit','Why good fit'],
      ['relevant_experience','Relevant experience'],['skills_match','Skills match'],['availability','Availability'],
      ['sponsorship_answer','Sponsorship answer'],['salary_expectation','Salary expectation'],['notes_for_review','Notes for review']
    ];
    const longAnswers = new Set(['why_interested','why_good_fit','relevant_experience','skills_match','sponsorship_answer','notes_for_review']);
    function editableAppDetails(app){ const job = app.job || {}; const answers = app.generated_answers || {}; const sources = app.generated_answer_sources || {}; const missing = new Set(app.missing_fields || []); const fields = answerFields.map(([key,label]) => { const value = escapeHTML(answers[key] || ''); const source = escapeHTML(sources[key] || 'manual_required'); const warning = missing.has(key) ? ' border-error bg-error-container/20' : ''; return `<label class="block"><span class="flex items-center justify-between gap-2 font-label-md text-label-md uppercase text-on-surface-variant"><span>${label}</span><span class="normal-case px-1.5 py-0.5 bg-surface-container-high border border-outline-variant rounded text-[10px]">${source}</span></span>${longAnswers.has(key) ? `<textarea data-answer-key="${key}" rows="3" class="cc-input mt-1 resize-y${warning}">${value}</textarea>` : `<input data-answer-key="${key}" class="cc-input mt-1${warning}" value="${value}">`}</label>`; }).join(''); return `<div><div class="flex items-center gap-unit-sm mb-unit-xs"><span id="current-status-badge">${renderStatusBadge(app.status)}</span><span class="px-2 py-0.5 rounded-full bg-surface-container-high text-on-surface-variant font-label-md text-label-md uppercase">${escapeHTML(job.company)}</span></div><h2 class="font-headline-lg text-headline-lg text-on-surface mb-unit-sm">Review Application Data</h2><p class="text-on-surface-variant">Review and edit every answer before opening the real application. CareerCaddy never performs final submission.</p></div><div class="cc-card p-unit-md"><h3 class="font-headline-md text-headline-md flex items-center gap-unit-sm mb-4"><span class="material-symbols-outlined text-primary">work</span>Job Info</h3><div class="space-y-2 text-body-md"><p><b>${escapeHTML(job.title)}</b></p><p>${escapeHTML(job.location)}</p><p>Resume: ${escapeHTML(app.resume_version || job.resume_version)}</p></div></div><form id="review-answer-form" class="cc-card p-unit-md"><h3 class="font-headline-md text-headline-md flex items-center gap-unit-sm mb-4"><span class="material-symbols-outlined text-primary">edit_note</span>Generated Answers</h3><div class="grid grid-cols-1 md:grid-cols-2 gap-unit-md">${fields}</div><label class="block mt-unit-md"><span class="font-label-md text-label-md uppercase text-on-surface-variant">Review note</span><textarea id="review-note" rows="2" class="cc-input mt-1" placeholder="Optional note saved to the application log"></textarea></label></form>`; }
    function activityPanel(app){ const logs = (app.logs || []).map((log,index) => `<li class="relative pl-8 pb-4 last:pb-0"><span class="absolute left-0 top-0.5 w-5 h-5 rounded-full bg-primary-fixed text-on-primary-fixed flex items-center justify-center text-[10px] font-semibold">${index + 1}</span>${index < app.logs.length - 1 ? '<span class="absolute left-[9px] top-5 bottom-0 border-l border-outline-variant"></span>' : ''}<p class="text-sm">${escapeHTML(log)}</p></li>`).join('') || '<li class="text-on-surface-variant">Waiting for automation activity.</li>'; const blocker = app.blocker ? `<div class="rounded-lg border border-error/20 bg-error-container p-3 text-on-error-container"><b>Blocker:</b> ${escapeHTML(app.blocker)}</div>` : ''; const screenshot = app.screenshot_path ? `<div class="space-y-3"><div class="bg-surface-container-low border border-outline-variant rounded-lg min-h-[220px] p-3 flex items-center justify-center"><img id="application-screenshot" class="max-h-[440px] max-w-full object-contain rounded" alt="Latest application automation screenshot"></div><div class="flex flex-wrap gap-2"><button id="open-screenshot" class="cc-button cc-button-secondary" disabled><span class="material-symbols-outlined text-sm">open_in_new</span>Open screenshot</button><button id="download-screenshot" class="cc-button cc-button-secondary" disabled><span class="material-symbols-outlined text-sm">download</span>Download screenshot</button></div></div>` : '<div class="border border-dashed border-outline-variant rounded-lg p-8 text-center text-on-surface-variant">A screenshot will appear after the worker opens the application page.</div>'; return `<div class="bg-error-container text-on-error-container border border-error/20 rounded-lg p-unit-md flex items-start gap-unit-md shadow-sm"><span class="material-symbols-outlined mt-0.5">verified_user</span><div><h4 class="font-headline-md text-headline-md mb-1">Manual submission is always required.</h4><p>The worker fills only safe known fields and never clicks final submit or bypasses blockers.</p></div></div><section class="cc-card p-unit-md space-y-5"><div class="flex flex-wrap items-start justify-between gap-3"><div><h3 class="font-headline-md text-headline-md">Automation Activity</h3><p class="text-on-surface-variant mt-1">Live worker progress, refreshed every 5 seconds while running.</p></div>${renderStatusBadge(app.status)}</div><div class="grid grid-cols-1 sm:grid-cols-2 gap-3"><div class="rounded-lg bg-surface-container-low p-3"><p class="font-label-md text-label-md uppercase text-on-surface-variant">Current status</p><p class="mt-1 font-semibold">${escapeHTML(app.status || 'UNKNOWN')}</p></div><div class="rounded-lg bg-surface-container-low p-3"><p class="font-label-md text-label-md uppercase text-on-surface-variant">Current step</p><p class="mt-1 font-semibold">${escapeHTML(app.current_step || 'Waiting')}</p></div></div>${blocker}<div><h4 class="font-semibold mb-3">Timeline</h4><ol class="space-y-1">${logs}</ol></div><div><h4 class="font-semibold mb-3">Latest screenshot</h4>${screenshot}</div><div class="flex flex-wrap gap-2 pt-2 border-t border-outline-variant"><button id="activity-refresh" class="cc-button cc-button-secondary"><span class="material-symbols-outlined text-sm">refresh</span>Refresh Status</button><button id="activity-open-app" class="cc-button cc-button-secondary"><span class="material-symbols-outlined text-sm">open_in_new</span>Open Application Link</button><button id="activity-submit" class="cc-button cc-button-primary"><span class="material-symbols-outlined text-sm">check_circle</span>Mark Submitted</button><button id="activity-block" class="cc-button cc-button-danger"><span class="material-symbols-outlined text-sm">block</span>Mark Blocked</button></div></section>`; }
    function clearScreenshot(){ screenshotBlob = null; if(screenshotObjectUrl){ URL.revokeObjectURL(screenshotObjectUrl); screenshotObjectUrl = null; } }
    async function loadScreenshot(app){ const image = document.getElementById('application-screenshot'); if(!image) { clearScreenshot(); return; } const applicationId = app.application_id; clearScreenshot(); try{ const response = await CareerAPI.getApplicationScreenshot(applicationId); const blob = await response.blob(); if(!currentApp || currentApp.application_id !== applicationId) return; screenshotBlob = blob; screenshotObjectUrl = URL.createObjectURL(blob); image.src = screenshotObjectUrl; document.getElementById('open-screenshot').disabled = false; document.getElementById('download-screenshot').disabled = false; }catch(_){ image.replaceWith(Object.assign(document.createElement('p'),{className:'text-on-surface-variant',textContent:'Screenshot is unavailable.'})); } }
    function openApplication(){ if(!currentApp) return; const url = safeExternalUrl(currentApp.job?.apply_url); if(!url){ showToast('No valid application link is available.', 'error'); return; } window.open(url, '_blank', 'noopener,noreferrer'); }
    async function markCurrentSubmitted(){ if(!currentApp || !confirm('Confirm you reviewed the real application and submitted it manually?')) return; try{ await CareerAPI.markSubmitted(currentApp.application_id); showToast('Application marked submitted.'); await loadReview(); }catch(e){ handleError(e); } }
    async function markCurrentBlocked(){ if(!currentApp) return; try{ await CareerAPI.markBlocked(currentApp.application_id, {blocker:'BLOCKED', notes:'Blocked during user review'}); showToast('Application marked blocked.'); await loadReview(); }catch(e){ handleError(e); } }
    function bindActivityButtons(){ document.getElementById('activity-refresh')?.addEventListener('click', () => refreshAutomationStatus(true)); document.getElementById('activity-open-app')?.addEventListener('click', openApplication); document.getElementById('activity-submit')?.addEventListener('click', markCurrentSubmitted); document.getElementById('activity-block')?.addEventListener('click', markCurrentBlocked); document.getElementById('open-screenshot')?.addEventListener('click', () => { if(screenshotObjectUrl) window.open(screenshotObjectUrl, '_blank', 'noopener,noreferrer'); }); document.getElementById('download-screenshot')?.addEventListener('click', () => { if(!screenshotObjectUrl || !currentApp) return; const link = document.createElement('a'); link.href = screenshotObjectUrl; link.download = `${currentApp.application_id}_latest.png`; link.click(); }); }
    function scheduleRefresh(){ clearTimeout(refreshTimer); refreshTimer = null; if(currentApp && runningStatuses.has(currentApp.status)){ refreshTimer = setTimeout(() => refreshAutomationStatus(false), 5000); } }
    function renderActivity(){ document.getElementById('review-right').innerHTML = activityPanel(currentApp); bindActivityButtons(); loadScreenshot(currentApp); scheduleRefresh(); const badge = document.getElementById('current-status-badge'); if(badge) badge.innerHTML = renderStatusBadge(currentApp.status); }
    function renderReview(){ document.getElementById('review-left').innerHTML = editableAppDetails(currentApp); renderActivity(); }
    async function refreshAutomationStatus(showNotice){ if(!currentApp) return; try{ const status = await CareerAPI.getAutomationStatus(currentApp.application_id); currentApp = {...currentApp, ...status}; renderActivity(); if(showNotice) showToast('Automation status refreshed.'); }catch(e){ handleError(e); scheduleRefresh(); } }
    async function loadReview(){ clearTimeout(refreshTimer); try { const apps = await CareerAPI.getApplications(); const visible = apps.filter(app => !['SUBMITTED','SKIPPED'].includes(app.status)); const priority = {IN_PROGRESS:0, READY_FOR_WORKER:1, NEEDS_REVIEW:2, FAILED:3, BLOCKED:4}; visible.sort((a,b) => (priority[a.status] ?? 9) - (priority[b.status] ?? 9)); currentApp = visible.find(app => app.application_id === currentApp?.application_id) || visible[0]; if(!currentApp){ clearScreenshot(); document.getElementById('review-left').innerHTML = '<div class="cc-card p-8 text-center text-on-surface-variant">No applications are waiting for automation or review.</div>'; document.getElementById('review-right').innerHTML = ''; return; } renderReview(); } catch(e){ handleError(e); } }
    document.getElementById('save-review').onclick = async () => { if(!currentApp) return; const answers = {}; document.querySelectorAll('[data-answer-key]').forEach(field => answers[field.dataset.answerKey] = field.value); try{ currentApp = await CareerAPI.saveApplicationReview(currentApp.application_id, answers, document.getElementById('review-note').value); showToast('Review changes saved.'); loadReview(); }catch(e){ handleError(e); } };
    document.getElementById('open-app').onclick = openApplication;
    document.getElementById('regenerate-answers').onclick = async () => { if(!currentApp) return; try{ await CareerAPI.regenerateAnswers(currentApp.application_id); showToast('Answers regenerated from resume and profile.'); loadReview(); }catch(e){ handleError(e); } };
    document.getElementById('start-automation').onclick = async () => { if(!currentApp) return; try{ let result = await CareerAPI.startAutomation(currentApp.application_id); if(result.requires_confirmation){ const fields = result.missing_fields.join(', '); if(!confirm(`Missing important fields: ${fields}. Queue automation anyway?`)) return; result = await CareerAPI.startAutomation(currentApp.application_id, true); } if(result.queued){ currentApp = {...currentApp, ...result.application}; showToast('Automation queued. Worker will prepare the form and stop before submission.'); renderReview(); } }catch(e){ handleError(e); } };
    document.getElementById('submit-app').onclick = markCurrentSubmitted;
    document.getElementById('skip-app').onclick = async () => { if(!currentApp) return; try{ await CareerAPI.skipApplication(currentApp.application_id); showToast('Application skipped.'); loadReview(); }catch(e){ handleError(e); } };
    document.getElementById('block-app').onclick = markCurrentBlocked;
    window.addEventListener('beforeunload', () => { clearTimeout(refreshTimer); clearScreenshot(); });
    loadReview();
    </script>

</body>
