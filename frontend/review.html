    <div class="flex-1 flex overflow-hidden bg-surface-container-lowest">
      <div class="w-full lg:w-1/2 overflow-y-auto custom-scrollbar border-r border-outline-variant p-gutter pb-28">

<div id="toast-root" class="fixed right-4 bottom-4 z-[100] space-y-2"></div>
<script src="/assets/api.js"></script>
<script src="/assets/app.js"></script>

    <script>
    let currentApp = null;
    function appDetails(app){ const job = app.job || {}; return `<div><div class="flex items-center gap-unit-sm mb-unit-xs">${renderStatusBadge(app.status)}<span class="px-2 py-0.5 rounded-full bg-surface-container-high text-on-surface-variant font-label-md text-label-md uppercase">${job.company||''}</span></div><h2 class="font-headline-lg text-headline-lg text-on-surface mb-unit-sm">Review Application Data</h2><p class="text-on-surface-variant">Review required before final submission. Confirm all answers are accurate before marking this application as submitted.</p></div><div class="cc-card p-unit-md"><h3 class="font-headline-md text-headline-md flex items-center gap-unit-sm mb-4"><span class="material-symbols-outlined text-primary">work</span>Job Info</h3><div class="space-y-2 text-body-md"><p><b>${job.title||''}</b></p><p>${job.location||''}</p><p><a class="text-primary" href="${job.apply_url||'#'}" target="_blank">${job.apply_url||''}</a></p><p>Resume: ${app.resume_version || job.resume_version || ''}</p></div></div><div class="cc-card p-unit-md"><h3 class="font-headline-md text-headline-md flex items-center gap-unit-sm mb-4"><span class="material-symbols-outlined text-primary">quiz</span>Generated Answers</h3><pre class="whitespace-pre-wrap bg-surface-container-low border border-outline-variant rounded p-3 text-sm">${JSON.stringify(app.generated_answers || {note:'No generated answers yet.'}, null, 2)}</pre></div><div class="cc-card p-unit-md"><h3 class="font-headline-md text-headline-md flex items-center gap-unit-sm mb-4"><span class="material-symbols-outlined text-primary">receipt_long</span>Logs</h3><ul class="space-y-2">${(app.logs||[]).map(l=>`<li class="p-2 bg-surface-container-low border border-outline-variant rounded">${l}</li>`).join('') || '<li class="text-on-surface-variant">No logs yet.</li>'}</ul></div>`; }
    function preview(app){ return `<div class="bg-error-container text-on-error-container border border-error/20 rounded-lg p-unit-md flex items-start gap-unit-md shadow-sm"><span class="material-symbols-outlined mt-0.5">warning</span><div><h4 class="font-headline-md text-headline-md mb-1">Review required before final submission.</h4><p class="font-body-md text-body-md">Confirm all answers are accurate before marking this application as submitted.</p></div></div><div class="flex-1 min-h-[320px] border border-outline-variant rounded-lg overflow-hidden flex flex-col bg-surface shadow-sm"><div class="bg-surface-container-highest border-b border-outline-variant px-unit-sm py-2 flex items-center gap-2"><div class="flex gap-1.5"><div class="w-3 h-3 rounded-full bg-error/80"></div><div class="w-3 h-3 rounded-full bg-tertiary/80"></div><div class="w-3 h-3 rounded-full bg-emerald-500"></div></div><div class="mx-auto px-4 py-1 bg-surface rounded text-xs text-on-surface-variant border border-outline-variant truncate max-w-sm">Prepared form preview</div></div><div class="flex-1 bg-surface-container-low p-4 flex items-center justify-center">${app.screenshot_path ? `<img class="max-h-[520px] object-contain border border-outline-variant rounded" src="/${app.screenshot_path.replaceAll('\\','/').replace(/^.*uploads\//,'uploads/')}" />` : '<div class="border border-dashed border-outline-variant rounded p-10 text-on-surface-variant">Screenshot appears after worker prepares the form.</div>'}</div></div><div class="cc-card p-unit-md"><h3 class="font-headline-md text-headline-md mb-unit-md">Automation Status</h3><div class="space-y-4"><p>Data Extraction: complete or pending</p><p>Form Mapping: stopped before submit</p><p class="text-primary font-medium">Pending Review: awaiting your approval</p></div></div>`; }
    async function loadReview(){ try { const apps = await CareerAPI.getApplications({status:'NEEDS_REVIEW'}); currentApp = apps[0]; if(!currentApp){ document.getElementById('review-left').innerHTML = '<div class="cc-card p-8 text-center text-on-surface-variant">No applications need review.</div>'; document.getElementById('review-right').innerHTML = ''; return; } document.getElementById('review-left').innerHTML = appDetails(currentApp); document.getElementById('review-right').innerHTML = preview(currentApp); } catch(e){ handleError(e); } }
    document.getElementById('submit-app').onclick = async () => { if(!currentApp) return; if(!confirm('Confirm you reviewed the real application and submitted it manually?')) return; try{ await CareerAPI.markSubmitted(currentApp.application_id); showToast('Application marked submitted.'); loadReview(); }catch(e){ handleError(e); } };
    document.getElementById('skip-app').onclick = async () => { if(!currentApp) return; try{ await CareerAPI.skipApplication(currentApp.application_id); showToast('Application skipped.'); loadReview(); }catch(e){ handleError(e); } };
    document.getElementById('block-app').onclick = async () => { if(!currentApp) return; try{ await CareerAPI.markBlocked(currentApp.application_id, {blocker:'FAILED', notes:'Blocked during user review'}); showToast('Application marked blocked.'); loadReview(); }catch(e){ handleError(e); } };
    loadReview();
    </script>
