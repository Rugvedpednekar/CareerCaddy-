    <div class="flex-1 flex overflow-hidden bg-surface-container-lowest">

<div id="toast-root" class="fixed right-4 bottom-4 z-[100] space-y-2"></div>
<script src="/assets/api.js"></script>
<script src="/assets/app.js"></script>

    <script>
    let currentApp = null;
    const answerFields = [
      ['full_name','Full name'],['email','Email'],['phone','Phone'],['location','Location'],
      ['linkedin','LinkedIn'],['github','GitHub'],['portfolio','Portfolio'],['work_authorization','Work authorization'],
      ['resume_version','Resume version'],['why_interested','Why interested'],['why_good_fit','Why good fit'],
      ['relevant_experience','Relevant experience'],['skills_match','Skills match'],['availability','Availability'],
      ['sponsorship_answer','Sponsorship answer'],['salary_expectation','Salary expectation'],['notes_for_review','Notes for review']
    ];
    const longAnswers = new Set(['why_interested','why_good_fit','relevant_experience','skills_match','sponsorship_answer','notes_for_review']);
    function editableAppDetails(app){ const job = app.job || {}; const answers = app.generated_answers || {}; const sources = app.generated_answer_sources || {}; const missing = new Set(app.missing_fields || []); const fields = answerFields.map(([key,label]) => { const value = escapeHTML(answers[key] || ''); const source = escapeHTML(sources[key] || 'manual_required'); const warning = missing.has(key) ? ' border-error bg-error-container/20' : ''; return `<label class="block"><span class="flex items-center justify-between gap-2 font-label-md text-label-md uppercase text-on-surface-variant"><span>${label}</span><span class="normal-case px-1.5 py-0.5 bg-surface-container-high border border-outline-variant rounded text-[10px]">${source}</span></span>${longAnswers.has(key) ? `<textarea data-answer-key="${key}" rows="3" class="cc-input mt-1 resize-y${warning}">${value}</textarea>` : `<input data-answer-key="${key}" class="cc-input mt-1${warning}" value="${value}">`}</label>`; }).join(''); const logs = (app.logs||[]).map(log=>`<li class="p-2 bg-surface-container-low border border-outline-variant rounded">${escapeHTML(log)}</li>`).join('') || '<li class="text-on-surface-variant">No logs yet.</li>'; return `<div><div class="flex items-center gap-unit-sm mb-unit-xs">${renderStatusBadge(app.status)}<span class="px-2 py-0.5 rounded-full bg-surface-container-high text-on-surface-variant font-label-md text-label-md uppercase">${escapeHTML(job.company)}</span></div><h2 class="font-headline-lg text-headline-lg text-on-surface mb-unit-sm">Review Application Data</h2><p class="text-on-surface-variant">Review and edit every answer before opening the real application. CareerCaddy never performs final submission.</p></div><div class="cc-card p-unit-md"><h3 class="font-headline-md text-headline-md flex items-center gap-unit-sm mb-4"><span class="material-symbols-outlined text-primary">work</span>Job Info</h3><div class="space-y-2 text-body-md"><p><b>${escapeHTML(job.title)}</b></p><p>${escapeHTML(job.location)}</p><p>Resume: ${escapeHTML(app.resume_version || job.resume_version)}</p></div></div><form id="review-answer-form" class="cc-card p-unit-md"><h3 class="font-headline-md text-headline-md flex items-center gap-unit-sm mb-4"><span class="material-symbols-outlined text-primary">edit_note</span>Generated Answers</h3><div class="grid grid-cols-1 md:grid-cols-2 gap-unit-md">${fields}</div><label class="block mt-unit-md"><span class="font-label-md text-label-md uppercase text-on-surface-variant">Review note</span><textarea id="review-note" rows="2" class="cc-input mt-1" placeholder="Optional note saved to the application log"></textarea></label></form><div class="cc-card p-unit-md"><h3 class="font-headline-md text-headline-md flex items-center gap-unit-sm mb-4"><span class="material-symbols-outlined text-primary">receipt_long</span>Logs</h3><ul class="space-y-2">${logs}</ul></div>`; }
    function appDetails(app){ const job = app.job || {}; return `<div><div class="flex items-center gap-unit-sm mb-unit-xs">${renderStatusBadge(app.status)}<span class="px-2 py-0.5 rounded-full bg-surface-container-high text-on-surface-variant font-label-md text-label-md uppercase">${job.company||''}</span></div><h2 class="font-headline-lg text-headline-lg text-on-surface mb-unit-sm">Review Application Data</h2><p class="text-on-surface-variant">Review required before final submission. Confirm all answers are accurate before marking this application as submitted.</p></div><div class="cc-card p-unit-md"><h3 class="font-headline-md text-headline-md flex items-center gap-unit-sm mb-4"><span class="material-symbols-outlined text-primary">work</span>Job Info</h3><div class="space-y-2 text-body-md"><p><b>${job.title||''}</b></p><p>${job.location||''}</p><p><a class="text-primary" href="${job.apply_url||'#'}" target="_blank">${job.apply_url||''}</a></p><p>Resume: ${app.resume_version || job.resume_version || ''}</p></div></div><div class="cc-card p-unit-md"><h3 class="font-headline-md text-headline-md flex items-center gap-unit-sm mb-4"><span class="material-symbols-outlined text-primary">quiz</span>Generated Answers</h3><pre class="whitespace-pre-wrap bg-surface-container-low border border-outline-variant rounded p-3 text-sm">${JSON.stringify(app.generated_answers || {note:'No generated answers yet.'}, null, 2)}</pre></div><div class="cc-card p-unit-md"><h3 class="font-headline-md text-headline-md flex items-center gap-unit-sm mb-4"><span class="material-symbols-outlined text-primary">receipt_long</span>Logs</h3><ul class="space-y-2">${(app.logs||[]).map(l=>`<li class="p-2 bg-surface-container-low border border-outline-variant rounded">${l}</li>`).join('') || '<li class="text-on-surface-variant">No logs yet.</li>'}</ul></div>`; }
    function preview(app){ return `<div class="bg-error-container text-on-error-container border border-error/20 rounded-lg p-unit-md flex items-start gap-unit-md shadow-sm"><span class="material-symbols-outlined mt-0.5">warning</span><div><h4 class="font-headline-md text-headline-md mb-1">Review required before final submission.</h4><p class="font-body-md text-body-md">Confirm all answers are accurate before marking this application as submitted.</p></div></div><div class="flex-1 min-h-[320px] border border-outline-variant rounded-lg overflow-hidden flex flex-col bg-surface shadow-sm"><div class="bg-surface-container-highest border-b border-outline-variant px-unit-sm py-2 flex items-center gap-2"><div class="mx-auto px-4 py-1 bg-surface rounded text-xs text-on-surface-variant border border-outline-variant">Prepared form preview</div></div><div class="flex-1 bg-surface-container-low p-4 flex items-center justify-center">${app.screenshot_path ? '<img id="application-screenshot" class="max-h-[520px] object-contain border border-outline-variant rounded" alt="Prepared application screenshot">' : '<div class="border border-dashed border-outline-variant rounded p-10 text-on-surface-variant">Screenshot appears after worker prepares the form.</div>'}</div></div><div class="cc-card p-unit-md"><h3 class="font-headline-md text-headline-md mb-unit-md">Automation Status</h3><div class="space-y-4"><p>Data Extraction: complete or pending</p><p>Form Mapping: stopped before submit</p><p class="text-primary font-medium">Pending Review: awaiting your approval</p></div></div>`; }
    async function loadScreenshot(app){ const image = document.getElementById('application-screenshot'); if(!image) return; try{ const response = await CareerAPI.getApplicationScreenshot(app.application_id); image.src = URL.createObjectURL(await response.blob()); }catch(_){ image.replaceWith(Object.assign(document.createElement('p'),{className:'text-on-surface-variant',textContent:'Screenshot is unavailable.'})); } }
    async function loadReview(){ try { const apps = await CareerAPI.getApplications({status:'NEEDS_REVIEW'}); currentApp = apps[0]; if(!currentApp){ document.getElementById('review-left').innerHTML = '<div class="cc-card p-8 text-center text-on-surface-variant">No applications need review.</div>'; document.getElementById('review-right').innerHTML = ''; return; } document.getElementById('review-left').innerHTML = editableAppDetails(currentApp); document.getElementById('review-right').innerHTML = preview(currentApp); loadScreenshot(currentApp); } catch(e){ handleError(e); } }
    document.getElementById('save-review').onclick = async () => { if(!currentApp) return; const answers = {}; document.querySelectorAll('[data-answer-key]').forEach(field => answers[field.dataset.answerKey] = field.value); try{ currentApp = await CareerAPI.saveApplicationReview(currentApp.application_id, answers, document.getElementById('review-note').value); showToast('Review changes saved.'); loadReview(); }catch(e){ handleError(e); } };
    document.getElementById('open-app').onclick = () => { if(!currentApp) return; const url = safeExternalUrl(currentApp.job?.apply_url); if(!url){ showToast('No valid application link is available.', 'error'); return; } window.open(url, '_blank', 'noopener,noreferrer'); };
    document.getElementById('regenerate-answers').onclick = async () => { if(!currentApp) return; try{ await CareerAPI.regenerateAnswers(currentApp.application_id); showToast('Answers regenerated from resume and profile.'); loadReview(); }catch(e){ handleError(e); } };
    document.getElementById('start-automation').onclick = async () => { if(!currentApp) return; try{ let result = await CareerAPI.startAutomation(currentApp.application_id); if(result.requires_confirmation){ const fields = result.missing_fields.join(', '); if(!confirm(`Missing important fields: ${fields}. Queue automation anyway?`)) return; result = await CareerAPI.startAutomation(currentApp.application_id, true); } if(result.queued){ showToast('Automation queued. Worker will prepare the form and stop before submission.'); loadReview(); } }catch(e){ handleError(e); } };
    document.getElementById('submit-app').onclick = async () => { if(!currentApp) return; if(!confirm('Confirm you reviewed the real application and submitted it manually?')) return; try{ await CareerAPI.markSubmitted(currentApp.application_id); showToast('Application marked submitted.'); loadReview(); }catch(e){ handleError(e); } };
    document.getElementById('skip-app').onclick = async () => { if(!currentApp) return; try{ await CareerAPI.skipApplication(currentApp.application_id); showToast('Application skipped.'); loadReview(); }catch(e){ handleError(e); } };
    document.getElementById('block-app').onclick = async () => { if(!currentApp) return; try{ await CareerAPI.markBlocked(currentApp.application_id, {blocker:'FAILED', notes:'Blocked during user review'}); showToast('Application marked blocked.'); loadReview(); }catch(e){ handleError(e); } };
    loadReview();
    </script>

</body>
