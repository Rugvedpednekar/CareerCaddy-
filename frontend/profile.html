>sponsorship answer</span><input name="sponsorship_answer" class="cc-input mt-1"></label><div class="md:col-span-2 flex justify-end"><button class="cc-button cc-button-primary">Save Profile</button></div></form>

<div id="toast-root" class="fixed right-4 bottom-4 z-[100] space-y-2"></div>
<script src="/assets/api.js"></script>
<script src="/assets/app.js"></script>

    <script>
    async function loadProfile(){ try{ const p = await CareerAPI.getProfile(); document.querySelectorAll('#profile-form [name]').forEach(i => i.value = p[i.name] || ''); }catch(e){ const local = JSON.parse(localStorage.getItem('cc_profile')||'{}'); document.querySelectorAll('#profile-form [name]').forEach(i => i.value = local[i.name] || ''); } }
    document.getElementById('profile-form').onsubmit = async (e) => { e.preventDefault(); const payload = Object.fromEntries(new FormData(e.target).entries()); localStorage.setItem('cc_profile', JSON.stringify(payload)); try{ await CareerAPI.saveProfile(payload); showToast('Profile saved.'); }catch(err){ showToast('Saved locally; backend unavailable.', 'error'); } };
    loadProfile();
    </script>
